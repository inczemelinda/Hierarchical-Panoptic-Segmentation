_BASE_: r50_2t_9l_bs4_300ep.yaml
SEED: 42
MODEL:
  MASK_FORMER:
    DEEP_SUPERVISION: True
    DEC_LAYERS: 4
    # Tversky loss enabled
    USE_TVERSKY_LOSS: True
    TVERSKY_WEIGHT: 3.0
    TVERSKY_ALPHA: 0.3
    TVERSKY_BETA: 0.7
SOLVER:
  AMP:
    ENABLED: True
  IMS_PER_BATCH: 2
  MAX_ITER: 50                  # ~50 iter, enough to see loss decrease
  CHECKPOINT_PERIOD: 50         # save final model for inference
INPUT:
  IMAGE_SIZE: 1024
  USE_FULL_AUG: True            # all 7 augmentations active
  RANDOM_FLIP: "both"
DATALOADER:
  SAMPLER_TRAIN: "RepeatFactorTrainingSampler"   # class balancing
TEST:
  EVAL_PERIOD: 999999           # SKIP eval (saves 12 min)
RESIZE_AUG: False
OUTPUT_DIR: output/Exp_E2E_TEST
